_web_osgym_config: &web_osgym_config
  type: native
  base_url: "http://127.0.0.1:18000"
  minimum_safe_action_timeout: 45.0
  timeout: 60.0
  include_a11y: false

tools:
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "computer"
        description: ""
        parameters:
          type: "object"
          additionalProperties: false
          properties:
            actions:
              type: "array"
              minItems: 1
              maxItems: 10
              items:
                oneOf:
                  - type: "object"
                    description: "Move the cursor to coordinate [x, y] in the 1000×1000 grid."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["MOVE_TO"]
                      coordinate:
                        type: "array"
                        description: "[x, y] position in the 1000×1000 coordinate grid."
                        items:
                          type: "integer"
                          minimum: 0
                          maximum: 999
                        minItems: 2
                        maxItems: 2
                    required: ["action_type", "coordinate"]
                  - type: "object"
                    description: "Click at coordinate [x, y] if provided, otherwise at the current cursor position."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["CLICK"]
                      coordinate:
                        type: "array"
                        description: "[x, y] position in the 1000×1000 coordinate grid."
                        items:
                          type: "integer"
                          minimum: 0
                          maximum: 999
                        minItems: 2
                        maxItems: 2
                      button:
                        type: "string"
                        enum: ["left", "middle", "right"]
                      num_clicks:
                        type: "integer"
                        minimum: 1
                    required: ["action_type"]
                  - type: "object"
                    description: "Press the left button if the button not specified, otherwise press the specified button."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["MOUSE_DOWN"]
                      button:
                        type: "string"
                        enum: ["left", "middle", "right"]
                    required: ["action_type"]
                  - type: "object"
                    description: "Release the left button if the button not specified, otherwise release the specified button."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["MOUSE_UP"]
                      button:
                        type: "string"
                        enum: ["left", "middle", "right"]
                    required: ["action_type"]
                  - type: "object"
                    description: "Right click at coordinate [x, y] if provided, otherwise at the current cursor position."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["RIGHT_CLICK"]
                      coordinate:
                        type: "array"
                        description: "[x, y] position in the 1000×1000 coordinate grid."
                        items:
                          type: "integer"
                          minimum: 0
                          maximum: 999
                        minItems: 2
                        maxItems: 2
                    required: ["action_type"]
                  - type: "object"
                    description: "Double click at coordinate [x, y] if provided, otherwise at the current cursor position."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["DOUBLE_CLICK"]
                      coordinate:
                        type: "array"
                        description: "[x, y] position in the 1000×1000 coordinate grid."
                        items:
                          type: "integer"
                          minimum: 0
                          maximum: 999
                        minItems: 2
                        maxItems: 2
                    required: ["action_type"]
                  - type: "object"
                    description: "Drag to coordinate [x, y] with the left button pressed."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["DRAG_TO"]
                      coordinate:
                        type: "array"
                        description: "[x, y] position in the 1000×1000 coordinate grid."
                        items:
                          type: "integer"
                          minimum: 0
                          maximum: 999
                        minItems: 2
                        maxItems: 2
                    required: ["action_type", "coordinate"]
                  - type: "object"
                    description: "Scroll the mouse wheel. dy > 0 scrolls down (content moves up), dy < 0 scrolls up (content moves down). dx > 0 scrolls right, dx < 0 scrolls left."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["SCROLL"]
                      dx:
                        type: "integer"
                      dy:
                        type: "integer"
                    required: ["action_type", "dx", "dy"]
                  - type: "object"
                    description: "Type the specified text."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["TYPING"]
                      text:
                        type: "string"
                    required: ["action_type", "text"]
                  - type: "object"
                    description: "Press the specified single key and release it. Key must be a single key name."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["PRESS"]
                      key:
                        type: "string"
                    required: ["action_type", "key"]
                  - type: "object"
                    description: "Press the specified single key."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["KEY_DOWN"]
                      key:
                        type: "string"
                    required: ["action_type", "key"]
                  - type: "object"
                    description: "Release the specified single key."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["KEY_UP"]
                      key:
                        type: "string"
                    required: ["action_type", "key"]
                  - type: "object"
                    description: "Press the specified key combination. keys is an array of key names, for example ['ctrl', 'c']."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["HOTKEY"]
                      keys:
                        type: "array"
                        items:
                          type: "string"
                    required: ["action_type", "keys"]
                  - type: "object"
                    description: "Wait until the next action."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["WAIT"]
                    required: ["action_type"]
                  - type: "object"
                    description: "Decide the task cannot be performed."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["FAIL"]
                    required: ["action_type"]
                  - type: "object"
                    description: "Decide the task is done."
                    additionalProperties: false
                    properties:
                      action_type:
                        type: "string"
                        enum: ["DONE"]
                    required: ["action_type"]
          required: ["actions"]
