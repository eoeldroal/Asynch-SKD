_web_osgym_config: &web_osgym_config
  type: native
  base_url: "http://127.0.0.1:18000"
  minimum_safe_action_timeout: 45.0
  timeout: 60.0
  include_a11y: false

tools:
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "MOVE_TO"
        description: "Move the cursor to the specified position. Provide coordinate as a JSON array of exactly two integers in the 1000x1000 coordinate system, for example [531, 582]. Do not split the position into separate x/y fields."
        parameters:
          type: "object"
          additionalProperties: false
          properties:
            coordinate:
              type: "array"
              items:
                type: "integer"
                minimum: 0
                maximum: 999
              minItems: 2
              maxItems: 2
          required: ["coordinate"]
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "CLICK"
        description: "Click the left button if the button is not specified, otherwise click the specified button. Click at the current position if coordinate is omitted; otherwise click at the specified position. When provided, coordinate must be a JSON array of exactly two integers in the 1000x1000 coordinate system, for example [531, 582]."
        parameters:
          type: "object"
          additionalProperties: false
          properties:
            button:
              type: "string"
              enum: ["left", "middle", "right"]
            coordinate:
              type: "array"
              items:
                type: "integer"
                minimum: 0
                maximum: 999
              minItems: 2
              maxItems: 2
            num_clicks:
              type: "integer"
              minimum: 1
              maximum: 3
          required: []
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "MOUSE_DOWN"
        description: "Press the left button if the button not specified, otherwise press the specified button."
        parameters:
          type: "object"
          additionalProperties: false
          properties:
            button:
              type: "string"
              enum: ["left", "middle", "right"]
          required: []
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "MOUSE_UP"
        description: "Release the left button if the button not specified, otherwise release the specified button."
        parameters:
          type: "object"
          additionalProperties: false
          properties:
            button:
              type: "string"
              enum: ["left", "middle", "right"]
          required: []
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "RIGHT_CLICK"
        description: "Right click at the current position if coordinate is omitted, otherwise right click at the specified position. When provided, coordinate must be a JSON array of exactly two integers in the 1000x1000 coordinate system, for example [531, 582]."
        parameters:
          type: "object"
          additionalProperties: false
          properties:
            coordinate:
              type: "array"
              items:
                type: "integer"
                minimum: 0
                maximum: 999
              minItems: 2
              maxItems: 2
          required: []
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "DOUBLE_CLICK"
        description: "Double click at the current position if coordinate is omitted, otherwise double click at the specified position. When provided, coordinate must be a JSON array of exactly two integers in the 1000x1000 coordinate system, for example [531, 582]."
        parameters:
          type: "object"
          additionalProperties: false
          properties:
            coordinate:
              type: "array"
              items:
                type: "integer"
                minimum: 0
                maximum: 999
              minItems: 2
              maxItems: 2
          required: []
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "DRAG_TO"
        description: "Drag the cursor to the specified position with the left button pressed. Provide coordinate as a JSON array of exactly two integers in the 1000x1000 coordinate system, for example [531, 582]."
        parameters:
          type: "object"
          additionalProperties: false
          properties:
            coordinate:
              type: "array"
              items:
                type: "integer"
                minimum: 0
                maximum: 999
              minItems: 2
              maxItems: 2
          required: ["coordinate"]
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "SCROLL"
        description: "Scroll the current scrollable area. Negative dy scrolls down; positive dy scrolls up. Negative dx scrolls right; positive dx scrolls left. If dx is omitted, it defaults to 0."
        parameters:
          type: "object"
          additionalProperties: false
          properties:
            dx:
              type: "integer"
            dy:
              type: "integer"
          required: ["dy"]
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "TYPING"
        description: "Type the specified text."
        parameters:
          type: "object"
          additionalProperties: false
          properties:
            text:
              type: "string"
          required: ["text"]
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "PRESS"
        description: "Press the specified single key and release it. Key must be a single key name."
        parameters:
          type: "object"
          additionalProperties: false
          properties:
            key:
              type: "string"
          required: ["key"]
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "KEY_DOWN"
        description: "Press the specified single key."
        parameters:
          type: "object"
          additionalProperties: false
          properties:
            key:
              type: "string"
          required: ["key"]
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "KEY_UP"
        description: "Release the specified single key."
        parameters:
          type: "object"
          additionalProperties: false
          properties:
            key:
              type: "string"
          required: ["key"]
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "HOTKEY"
        description: "Press the specified key combination. keys must be an array of single string key names, for example ['ctrl', 'c']. Do not pass x/y here, and do not pass a single combined string like 'ctrl+c'."
        parameters:
          type: "object"
          additionalProperties: false
          properties:
            keys:
              type: "array"
              items:
                type: "string"
              minItems: 1
          required: ["keys"]
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "WAIT"
        description: "Wait for the current interface to update. You may optionally provide duration in seconds. The current runtime executes WAIT in 1-second steps, so duration is rounded up to the nearest whole-second wait step."
        parameters:
          type: "object"
          additionalProperties: false
          properties:
            duration:
              type: "number"
              minimum: 0.1
              maximum: 10.0
          required: []
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "FAIL"
        description: "Decide the task cannot be performed."
        parameters:
          type: "object"
          additionalProperties: false
          properties: {}
          required: []
  - class_name: "verl.tools.web_osgym_tool.WebOsGymTool"
    config: *web_osgym_config
    tool_schema:
      type: "function"
      function:
        name: "DONE"
        description: "Decide the task is done."
        parameters:
          type: "object"
          additionalProperties: false
          properties: {}
          required: []
